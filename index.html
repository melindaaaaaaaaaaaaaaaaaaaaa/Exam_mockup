<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaining Panels Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Chaining Panels Demo</h2>

<!-- ===== PANEL ATAS ===== -->
<div class="wrapper">

  <div class="panel">
    <textarea id="params-1"></textarea>
    <div class="buttons">
      <button>wipe-1</button>
      <button>data-1</button>
      <button disabled>read-1</button>
      <button disabled>exec-1</button>
    </div>
    <textarea></textarea>
  </div>

  <div class="panel">
    <textarea></textarea>
    <div class="buttons">
      <button>wipe-2</button>
      <button disabled>data-2</button>
      <button disabled>read-2</button>
      <button disabled>exec-2</button>
    </div>
    <canvas></canvas>
  </div>

  <div class="panel">
    <textarea></textarea>
    <div class="buttons">
      <button>wipe-3</button>
      <button disabled>data-3</button>
      <button disabled>read-3</button>
      <button disabled>exec-3</button>
    </div>
    <canvas></canvas>
  </div>

</div>

<!-- ===== BOTTOM ===== -->
<div class="bottom-wrapper">

  <div class="panel big-panel">

    <div class="top-area">
      <textarea id="params-input"></textarea>
      <textarea id="agents-input"></textarea>
    </div>

    <div class="buttons horizontal">
      <button id="wipe">wipe</button>
      <button id="data">data</button>
      <button id="read" disabled>read</button>
      <button id="exec" disabled>exec</button>
      <button id="none">none</button>
      <button id="info">info</button>
    </div>

    <canvas id="map-4"></canvas>

  </div>

  <div class="panel progress-panel">
    <div class="progress-row"><button id="p1">scan</button><progress id="b1"></progress></div>
    <div class="progress-row"><button id="p2">filter</button><progress id="b2"></progress></div>
    <div class="progress-row"><button id="p3">format</button><progress id="b3"></progress></div>
    <div class="progress-row"><button id="p4">sort</button><progress id="b4"></progress></div>
    <div class="progress-row"><button id="p5">erase</button><progress id="b5"></progress></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
