<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaining Panels Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Chaining Panels Demo</h2>

<!-- ===== PANEL ATAS ===== -->
<div class="wrapper">

  <div class="panel">
    <textarea></textarea>
    <div class="buttons">
      <button>wipe-1</button>
      <button>data-1</button>
      <button disabled>read-1</button>
      <button disabled>exec-1</button>
    </div>
    <textarea></textarea>
  </div>

  <div class="panel">
    <textarea></textarea>
    <div class="buttons">
      <button>wipe-2</button>
      <button disabled>data-2</button>
      <button disabled>read-2</button>
      <button disabled>exec-2</button>
    </div>
    <canvas></canvas>
  </div>

  <div class="panel">
    <textarea></textarea>
    <div class="buttons">
      <button>wipe-3</button>
      <button disabled>data-3</button>
      <button disabled>read-3</button>
      <button disabled>exec-3</button>
    </div>
    <canvas></canvas>
  </div>

</div>

<!-- ===== PANEL BAWAH ===== -->
<div class="bottom-wrapper">

  <!-- LEFT -->
  <div class="panel big-panel">

    <div class="top-area">
      <textarea id="params-input"></textarea>
      <textarea id="agents-input"></textarea>
    </div>

    <div class="buttons horizontal">
      <button id="wipe">wipe</button>
      <button id="data">data</button>
      <button id="read" disabled>read</button>
      <button id="exec" disabled>exec</button>
      <button id="none">none</button>
      <button id="info">info</button>
    </div>

    <canvas id="map-4"></canvas>

  </div>

  <!-- RIGHT -->
  <div class="panel progress-panel">

    <div class="progress-row">
      <button id="prog-1">scan</button>
      <progress id="bar-1" value="0" max="100"></progress>
    </div>

    <div class="progress-row">
      <button id="prog-2">filter</button>
      <progress id="bar-2" value="0" max="100"></progress>
    </div>

    <div class="progress-row">
      <button id="prog-3">format</button>
      <progress id="bar-3" value="0" max="100"></progress>
    </div>

    <div class="progress-row">
      <button id="prog-4">sort</button>
      <progress id="bar-4" value="0" max="100"></progress>
    </div>

    <div class="progress-row">
      <button id="prog-5">erase</button>
      <progress id="bar-5" value="0" max="100"></progress>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
